<script>
function cpFunction() {
  var copyText = document.getElementById("cptxt");
  if (!copyText) return;

  var textToCopy = copyText.value || copyText.getAttribute("value") || "";

  if (!textToCopy) return;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(textToCopy).then(function () {
      alert("Copied the text: " + textToCopy);
    }).catch(function () {
      fallbackCopyText(textToCopy);
    });
  } else {
    fallbackCopyText(textToCopy);
  }
}

function fallbackCopyText(text) {
  var temp = document.createElement("textarea");
  temp.value = text;
  temp.setAttribute("readonly", "");
  temp.style.position = "fixed";
  temp.style.top = "-9999px";
  temp.style.left = "-9999px";
  document.body.appendChild(temp);
  temp.focus();
  temp.select();

  try {
    document.execCommand("copy");
    alert("Copied the text: " + text);
  } catch (e) {
    alert("Copy failed. Please copy manually:\n\n" + text);
  }

  document.body.removeChild(temp);
}

function isReallySandboxed() {
  try {
    if (window.top === window.self) return false;
  } catch (e) {
    // if even this fails, do not assume sandbox
    return false;
  }

  // 1) direct sandbox attribute check
  try {
    var fe = window.frameElement;
    if (fe && fe.hasAttribute && fe.hasAttribute('sandbox')) {
      return true;
    }
  } catch (e) {}

  // 2) sandbox without allow-same-origin often gives unique origin "null"
  try {
    if (String(window.location.origin).toLowerCase() === "null") {
      return true;
    }
  } catch (e) {}

  // 3) sandbox often blocks document.domain access/set
  try {
    var dd = document.domain;
    document.domain = dd;
  } catch (e) {
    return true;
  }

  return false;
}

function startPlayer(e) {
  if (e && isReallySandboxed()) {
    e.preventDefault();
    e.stopPropagation();

    var sbxErr = document.getElementById('sbxErr');
    if (sbxErr) sbxErr.style.display = 'flex';
    return false;
  }

  var iframe = $("#iframesrc");
  if (iframe.length && iframe.attr("src") === "about:blank") {
    iframe.attr("src", iframe.data("src"));
  }
  $(".dropdown").show();
  bgImage();
  return true;
}

$(".playbtnx").click(function(e){
  return startPlayer(e);
});

$(function(){
  if (!$(".playbtnx:visible").length && $("#iframesrc").length) {
    startPlayer();
  }
});

function bgImage() {
  var x = document.getElementById("bgImage");
  if (!x) return;

  if (x.style.display === "none") {
    x.style.display = "block";
  } else {
    x.remove();
    $(".playbtnx").hide();
  }
}

function myFunction() {
  document.getElementById("myDropdown").classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.matches('.dropbtn')) {
    var dropdowns = document.getElementsByClassName("dropdown-content");
    var i;
    for (i = 0; i < dropdowns.length; i++) {
      var openDropdown = dropdowns[i];
      if (openDropdown.classList.contains('show')) {
        openDropdown.classList.remove('show');
      }
    }
  }
}
</script>
